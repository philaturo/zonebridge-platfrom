version: "3"

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  DOCKER_DIR: deployments/docker

tasks:

  setup:
    desc: Install project dependencies
    cmds:
      - cd {{.BACKEND_DIR}} && go mod download
      - cd {{.FRONTEND_DIR}} && npm install

  backend:
    desc: Run backend
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - go run ./cmd/zonebridge

  frontend:
    desc: Run frontend
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run dev

  dev:
    desc: Run backend and frontend
    deps:
      - backend
      - frontend

  docker:
    desc: Start development containers
    cmds:
      - docker compose -f {{.DOCKER_DIR}}/compose.yaml up -d

  stop:
    desc: Stop containers
    cmds:
      - docker compose -f {{.DOCKER_DIR}}/compose.yaml down

  test:
    desc: Run all tests
    cmds:
      - cd {{.BACKEND_DIR}} && go test ./...
      - cd {{.FRONTEND_DIR}} && npm test

  lint:
    desc: Run all linters
    cmds:
      - cd {{.BACKEND_DIR}} && golangci-lint run
      - cd {{.FRONTEND_DIR}} && npm run lint

  build:
    desc: Build backend and frontend
    cmds:
      - cd {{.BACKEND_DIR}} && go build ./...
      - cd {{.FRONTEND_DIR}} && npm run build

  clean:
    desc: Remove generated artifacts
    cmds:
      - rm -rf backend/bin
      - rm -rf frontend/dist